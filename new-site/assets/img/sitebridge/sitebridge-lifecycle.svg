<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">SiteBridge 运营问题生命周期管理</title>
  <desc id="desc">从现象记录、现场影响分析、原因分析、临时对策、长期改善到效果确认的循环流程。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#005a9c"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#003554" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="960" height="560" fill="#f4f7fa"/>
  <circle cx="480" cy="280" r="168" fill="none" stroke="#c9d7e5" stroke-width="18"/>
  <path d="M480 112 A168 168 0 0 1 645 248" fill="none" stroke="#005a9c" stroke-width="18" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M645 312 A168 168 0 0 1 530 440" fill="none" stroke="#005a9c" stroke-width="18" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M430 440 A168 168 0 0 1 315 312" fill="none" stroke="#005a9c" stroke-width="18" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M315 248 A168 168 0 0 1 480 112" fill="none" stroke="#005a9c" stroke-width="18" stroke-linecap="round" marker-end="url(#arrow)"/>

  <circle cx="480" cy="280" r="92" fill="#003554" filter="url(#shadow)"/>
  <text x="480" y="268" text-anchor="middle" fill="#ffffff" font-family="'Noto Sans JP', sans-serif" font-size="28" font-weight="700">运营问题</text>
  <text x="480" y="306" text-anchor="middle" fill="#d7e8f6" font-family="'Noto Sans JP', sans-serif" font-size="22">持续改善闭环</text>

  <g filter="url(#shadow)">
    <rect x="376" y="42" width="208" height="74" rx="8" fill="#ffffff" stroke="#dce3ed"/>
    <text x="480" y="73" text-anchor="middle" fill="#003554" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700">现象记录</text>
    <text x="480" y="99" text-anchor="middle" fill="#475569" font-family="'Noto Sans JP', sans-serif" font-size="15">堵塞 / API异常 / 操作错误</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="662" y="160" width="218" height="74" rx="8" fill="#ffffff" stroke="#dce3ed"/>
    <text x="771" y="191" text-anchor="middle" fill="#003554" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700">现场影响分析</text>
    <text x="771" y="217" text-anchor="middle" fill="#475569" font-family="'Noto Sans JP', sans-serif" font-size="15">是否影响生产与运营</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="662" y="326" width="218" height="74" rx="8" fill="#ffffff" stroke="#dce3ed"/>
    <text x="771" y="357" text-anchor="middle" fill="#003554" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700">原因分析</text>
    <text x="771" y="383" text-anchor="middle" fill="#475569" font-family="'Noto Sans JP', sans-serif" font-size="15">网络 / 路线 / 流程</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="376" y="444" width="208" height="74" rx="8" fill="#ffffff" stroke="#dce3ed"/>
    <text x="480" y="475" text-anchor="middle" fill="#003554" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700">临时对策</text>
    <text x="480" y="501" text-anchor="middle" fill="#475569" font-family="'Noto Sans JP', sans-serif" font-size="15">限制区域 / 切换模式</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="80" y="326" width="218" height="74" rx="8" fill="#ffffff" stroke="#dce3ed"/>
    <text x="189" y="357" text-anchor="middle" fill="#003554" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700">长期改善</text>
    <text x="189" y="383" text-anchor="middle" fill="#475569" font-family="'Noto Sans JP', sans-serif" font-size="15">参数优化 / 流程优化</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="80" y="160" width="218" height="74" rx="8" fill="#ffffff" stroke="#dce3ed"/>
    <text x="189" y="191" text-anchor="middle" fill="#003554" font-family="'Noto Sans JP', sans-serif" font-size="22" font-weight="700">效果确认</text>
    <text x="189" y="217" text-anchor="middle" fill="#475569" font-family="'Noto Sans JP', sans-serif" font-size="15">是否真正改善</text>
  </g>
</svg>
